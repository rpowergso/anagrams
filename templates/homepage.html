{% extends "layout.html" %}
{% block content %}
<div style="text-align: center; padding: 50px;">
    <!-- The Big "Pretty" Title -->
    <h1 style="font-size: 4.5rem; text-shadow: 0 8px 0 var(--tile-shadow); margin-bottom: 40px; letter-spacing: 4px;">ANAGRAMS</h1>
    
    <div class="menu-card">
        <!-- SOLO MODE (The big blue button) -->
        <a href="/sologamescreen" style="text-decoration: none;">
            <button class="btn btn-blue" style="width: 100%; height: 65px; font-size: 1.4rem; margin-bottom: 30px; letter-spacing: 2px;">SOLO MODE</button>
        </a>
        
        <!-- MULTIPLAYER SECTION (Styled like the Bot section) -->
        <div style="border-top: 2px solid rgba(255,255,255,0.1); padding-top: 25px; margin-bottom: 30px;">
            <h3 style="letter-spacing: 3px; opacity: 0.8; margin-bottom: 20px; font-size: 0.9rem;">MULTIPLAYER</h3>
            
            <!-- Create Room Button -->
            <a href="/create-room" style="text-decoration: none;">
                <button class="btn btn-toggle" style="width: 100%; height: 50px; font-size: 1.1rem; margin-bottom: 15px; background: #9b59b6;">CREATE PRIVATE ROOM</button>
            </a>
            
            <!-- Join Room Form -->
            <form action="/join-room" method="POST" style="display: flex; gap: 10px;">
                <input type="text" name="room_id" placeholder="ROOM CODE" 
                       style="flex: 1; padding: 12px 20px; border-radius: 30px; border: 2px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; font-weight: bold; text-transform: uppercase; outline: none; text-align: center;">
                <button type="submit" class="btn btn-green" style="padding: 0 25px; border-radius: 30px;">JOIN</button>
            </form>
        </div>

        <!-- BOT MODES (Restored exactly as you had it) -->
        <div style="border-top: 2px solid rgba(255,255,255,0.1); padding-top: 25px;">
            <h3 style="letter-spacing: 3px; opacity: 0.8; margin-bottom: 20px; font-size: 0.9rem;">PLAY VS BOT</h3>
            <form method="post" action="/botgamescreen">
                <button type="submit" name="difficulty" value="easy" class="btn btn-green diff-btn" style="background: #27ae60;">Easy</button>
                <button type="submit" name="difficulty" value="medium" class="btn btn-green diff-btn" style="background: #f39c12;">Medium</button>
                <button type="submit" name="difficulty" value="hard" class="btn btn-green diff-btn" style="background: #e74c3c;">Hard</button>
                <input type="hidden" name="autodraw" value="off">
            </form>
        </div>
    </div>
</div>

<style>
    /* Ensure the join input looks good alongside your buttons */
    input::placeholder {
        color: rgba(255,255,255,0.4);
        letter-spacing: 1px;
        font-size: 0.8rem;
    }
    input:focus {
        border-color: var(--player-accent) !important;
        background: rgba(0,0,0,0.4) !important;
    }
</style>
{% endblock %}
