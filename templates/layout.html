<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Anagrams</title>
    <style>
        :root {
            --bg-color: #2c3e50;
            --board-color: #34495e;
            --tile-bg: #f3e5ab;
            --tile-shadow: #d4c48a;
            --player-accent: #3498db;
            --bot-accent: #e67e22;
        }
        body { background-color: var(--bg-color); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow-x: hidden; }
        
        .tile {
            background: var(--tile-bg); color: #333;
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; border-radius: 6px;
            box-shadow: 0 4px 0 var(--tile-shadow);
            text-transform: uppercase; user-select: none;
            border: 1px solid rgba(0,0,0,0.1);
        }
        .pool-tile { width: 65px; height: 65px; font-size: 2.2rem; }
        .small { width: 30px; height: 30px; font-size: 1.1rem; box-shadow: 0 2px 0 var(--tile-shadow); border-radius: 4px; }
        
        .btn { padding: 12px 25px; border-radius: 30px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-leave { background: #e74c3c; color: white; text-decoration: none; font-size: 0.8rem; padding: 8px 15px; }
        .btn-blue { background: var(--player-accent); color: white; }
        .btn-toggle { background: #9b59b6; color: white; }
        .btn-green { background: #2ecc71; color: white; }

        .score-badge { font-size: 2.5rem; font-weight: bold; }

        /* Container for side-by-side words */
        .words-container { 
            display: flex; 
            flex-wrap: wrap; 
            gap: 12px; 
            margin-top: 15px;
        }
        .word-block { 
            display: flex; 
            align-items: center; 
            gap: 2px; 
            background: rgba(0,0,0,0.2); 
            padding: 5px; 
            border-radius: 8px;
        }
        .word-score-tag { font-size: 0.85rem; margin-left: 6px; font-weight: bold; color: #f3e5ab; }

        .menu-card {
            background: var(--board-color); 
            display: inline-block; 
            padding: 40px; 
            border-radius: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }
        .diff-btn {
            width: 100%;
            margin: 10px 0;
            padding: 18px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
